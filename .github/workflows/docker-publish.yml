# 构建 Docker 镜像并发布到 GitHub Container Registry (ghcr.io)
# 触发：推送 main 分支 或 打 tag (v*) 或 手动运行
# 产物：ghcr.io/aisee-lab/aisee-jc:latest  和  :<git-sha>
name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # 支持在 GitHub 页面手动触发

env:
  REGISTRY: ghcr.io
  # 镜像名小写（GHCR 要求），Owner/仓库名按实际填写
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 发布镜像需要写权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多架构构建用）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 自动提供，无需额外配置

      - name: 提取镜像元数据（标签与小写化）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 构建并推送镜像（amd64 + arm64）
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
